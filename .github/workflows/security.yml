# ============================================================
#  RZ1 Security Enforcement — ethical-ai-my
#  Ardoop Technologies | Anuar Razii
#  Fix: git-aware .env scan + self-exclusion for grep patterns
#  Framework: ONSA 2025 | CPC | RMC (MCMC, eff. 1 Jun 2026)
# ============================================================

name: RZ1 Security Enforcement

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ── Cancel redundant runs on same branch/PR ────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Least-privilege permissions ────────────────────────────────
permissions:
  contents: read
  actions:  read

jobs:

  security-check:
    name: 🔐 RZ1 Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────────
      #  STEP 1 — Smart .env Detection (git-tracked files only)
      #
      #  FIX: Original `if find . -name ".env"; then` was wrong:
      #   • find exits 0 even when nothing found → always TRUE
      #   • No distinction between templates and real credentials
      #   • Does not exclude .git directory
      #
      #  NEW: Uses `git ls-files` (only committed/tracked files)
      #       + content inspection to separate templates vs secrets
      # ──────────────────────────────────────────────────────────
      - name: Detect .env files (git-aware)
        run: |
          echo "🔍 Scanning for committed .env files..."
          echo "──────────────────────────────────────────"

          # Only check files git is actually tracking
          TRACKED_ENV=$(git ls-files | grep -E '(^|/)\.env$' || true)

          if [ -z "$TRACKED_ENV" ]; then
            echo "  ✅ No tracked .env files found"
          else
            REAL_CREDS=0
            while IFS= read -r envfile; do
              echo "  ⚠️  Tracked .env detected: $envfile"

              # Inspect content — skip comments/blank lines, look for real values
              # Safe patterns: placeholders, angle-bracket tokens, example values
              REAL_VALUES=$(grep -vE '^\s*(#|$)' "$envfile" 2>/dev/null \
                | grep -E '^[A-Z_]+=.+' \
                | grep -ivE \
                  '(your_|<[^>]+>|example|placeholder|changeme|xxx|todo|fill|replace|enter_here|put_here)' \
                || true)

              if [ -n "$REAL_VALUES" ]; then
                echo "  ❌ $envfile — real credential values detected:"
                echo "$REAL_VALUES"
                REAL_CREDS=1
              else
                echo "  ✅ $envfile — template/placeholder values only (safe)"
              fi
            done <<< "$TRACKED_ENV"

            if [ "$REAL_CREDS" -eq 1 ]; then
              echo ""
              echo "──────────────────────────────────────────"
              echo "❌ SECURITY FAIL — committed .env with real credentials"
              echo "   HITL Action Required: Remove or redact before merge"
              exit 1
            fi
          fi

          echo "──────────────────────────────────────────"
          echo "✅ .env file check PASSED"

      # ──────────────────────────────────────────────────────────
      #  STEP 2 — Hardcoded Secret Pattern Detection
      #
      #  FIX: Original `grep -r "SECRET_KEY" .` had two bugs:
      #   • Scanned ALL file types including binary and .git
      #   • Scanned .github/workflows/ — finds its OWN search
      #     terms (self-referential false positive)
      #   • No filtering for legitimate env var references
      #     (e.g. process.env.API_KEY, os.environ['KEY'])
      #
      #  NEW: --exclude-dir=.github prevents self-match
      #       --include targets only source/config files
      #       Filter removes legitimate env-var references
      # ──────────────────────────────────────────────────────────
      - name: Detect hardcoded secret patterns
        run: |
          echo ""
          echo "🔍 Scanning for hardcoded credential patterns..."
          echo "──────────────────────────────────────────────────"

          PATTERNS=(
            "SECRET_KEY"
            "API_KEY"
            "PRIVATE_KEY"
            "ACCESS_TOKEN"
            "CLIENT_SECRET"
            "DB_PASSWORD"
            "DATABASE_URL"
            "BEARER_TOKEN"
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            RAW=$(grep -rn \
              --include="*.py"   --include="*.js"   --include="*.ts"  \
              --include="*.json" --include="*.env"  --include="*.sh"  \
              --include="*.php"  --include="*.rb"   --include="*.go"  \
              --exclude-dir=".git" \
              --exclude-dir=".github" \
              "$pattern" . 2>/dev/null || true)

            if [ -n "$RAW" ]; then
              # Filter out legitimate patterns:
              # process.env.KEY, os.environ['KEY'], getenv(), ${VAR}, ${{ secrets }}
              REAL=$(echo "$RAW" \
                | grep -v '#' \
                | grep -v 'process\.env\.' \
                | grep -v 'os\.environ' \
                | grep -v 'getenv(' \
                | grep -v 'ENV\[' \
                | grep -v '\${{' \
                | grep -v 'config\.' \
                | grep -v '\.env\.' \
                || true)

              if [ -n "$REAL" ]; then
                echo "  ⚠️  [$pattern] — potential hardcoded value:"
                echo "$REAL"
                FOUND=1
              fi
            fi
          done

          echo "──────────────────────────────────────────────────"
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ Hardcoded secret pattern check PASSED"
          else
            echo "❌ SECURITY FAIL — hardcoded credentials detected"
            echo "   HITL Action Required: Replace with environment secrets"
            exit 1
          fi

      # ──────────────────────────────────────────────────────────
      #  STEP 3 — .gitignore Policy Verification
      #  Ensure .env is listed in .gitignore (best practice)
      # ──────────────────────────────────────────────────────────
      - name: Verify .gitignore policy
        run: |
          echo ""
          echo "📄 Verifying .gitignore policy..."
          echo "──────────────────────────────────"

          if [ -f ".gitignore" ]; then
            if grep -qE '^\.env$|^\.env\s*$' .gitignore; then
              echo "  ✅ .env is listed in .gitignore"
            else
              echo "  ⚠️  .env is NOT in .gitignore — recommend adding it"
              echo "   Suggestion: echo '.env' >> .gitignore"
              # Warning only — not a hard fail
            fi
          else
            echo "  ⚠️  No .gitignore found — recommend creating one"
          fi

          echo "──────────────────────────────────"
          echo "✅ .gitignore policy check complete"

      # ──────────────────────────────────────────────────────────
      #  STEP 4 — Security Summary
      # ──────────────────────────────────────────────────────────
      - name: Security enforcement summary
        if: success()
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════╗"
          echo "║     RZ1 SECURITY ENFORCEMENT — SUMMARY          ║"
          echo "╠═════════════════════════════════════════════════╣"
          echo "║ Repository : $GITHUB_REPOSITORY"
          echo "║ Commit SHA : ${GITHUB_SHA:0:10}"
          echo "║ Timestamp  : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "╠═════════════════════════════════════════════════╣"
          echo "║ .env Detection (git-aware)   : ✅ PASSED        ║"
          echo "║ Secret Pattern Scan          : ✅ PASSED        ║"
          echo "║ .gitignore Policy            : ✅ VERIFIED      ║"
          echo "╠═════════════════════════════════════════════════╣"
          echo "║ OVERALL STATUS : ✅ SECURE                      ║"
          echo "║ Framework      : ONSA 2025 | CPC | RMC (MCMC)  ║"
          echo "╚═════════════════════════════════════════════════╝"


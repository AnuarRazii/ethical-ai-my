name: RZ1 Auto Merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: RZ1 Auto Merge
    runs-on: ubuntu-24.04
    if: github.actor == 'dependabot[bot]' || github.event.pull_request.author_association == 'OWNER'

    steps:
      - name: Enable auto-merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# RZ1 Compliance Engine — Ethical AI MY
# Tatacara Kerja Etika AI Malaysia — Ethical AI Governance Framework
# Framework: ONSA 2025 | CPC | RMC (MCMC, eff. 1 Jun 2026)

name: RZ1 Compliance Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compliance:
    name: compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required documents
        run: |
          echo "=== RZ1: Validating required governance documents ==="
          MISSING=0

          for doc in README.md LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md ETHICS.md GOVERNANCE.md ATTRIBUTION.md; do
            if [ -f "$doc" ]; then
              echo "PASS: $doc present"
            else
              echo "FAIL: Missing $doc"
              MISSING=1
            fi
          done

          for template in .github/PULL_REQUEST_TEMPLATE.md .github/ISSUE_TEMPLATE/bug_report.md .github/ISSUE_TEMPLATE/feature_request.md; do
            if [ -f "$template" ]; then
              echo "PASS: $template present"
            else
              echo "FAIL: Missing $template"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "FAIL: One or more required documents are missing"
            exit 1
          else
            echo "PASS: All required documents present"
          fi

      - name: Validate DCO sign-off on recent commits
        if: github.event_name == 'pull_request'
        run: |
          echo "=== RZ1: Checking DCO sign-off on PR commits ==="
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          UNSIGNED=0

          while IFS= read -r sha; do
            MESSAGE=$(git log -1 --format="%B" "$sha")
            if echo "$MESSAGE" | grep -qiE "^Signed-off-by:"; then
              echo "PASS: $sha has Signed-off-by"
            else
              echo "WARN: $sha is missing Signed-off-by (DCO)"
              UNSIGNED=1
            fi
          done < <(git log --format="%H" "$BASE..$HEAD")

          if [ "$UNSIGNED" -eq 1 ]; then
            echo "NOTE: Some commits are missing DCO sign-off."
            echo "      Please use 'git commit -s' or add 'Signed-off-by: Name <email>' to commit messages."
          fi

      - name: Validate CODEOWNERS
        run: |
          echo "=== RZ1: Checking CODEOWNERS ==="
          if [ -f ".github/CODEOWNERS" ]; then
            echo "PASS: CODEOWNERS present"
          else
            echo "FAIL: Missing .github/CODEOWNERS"
            exit 1
          fi

      - name: Ethical audit
        run: |
          echo "=== RZ1: Running ethical compliance checks ==="
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Commit SHA: ${GITHUB_SHA:0:10}"
          echo "Timestamp:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Framework:  ONSA 2025 | CPC | RMC (MCMC)"
          echo "STATUS:     COMPLIANT"

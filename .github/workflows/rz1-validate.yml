name: RZ1 Validate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    name: RZ1 Unified Validation Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          echo "Checking required files..."
          test -f README.md || (echo "README missing" && exit 1)

      - name: Validate compliance block
        run: |
          echo "Checking compliance statement..."
          grep -q "Prinsip Teras" README.md || (echo "Compliance block missing" && exit 1)

      - name: Security baseline check
        run: |
          echo "Security baseline OK"

      - name: Final validation
        run: echo "RZ1 VALIDATION PASSED"

name: RZ1 Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: RZ1 Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          set -e
          echo "Checking required files..."
          for file in README.md LICENSE ETHICS.md GOVERNANCE.md SECURITY.md ATTRIBUTION.md CODE_OF_CONDUCT.md FINAL_INTENT.md; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Missing required file: $file"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Validate ethical compliance
        run: |
          set -e
          grep -q "## Core Ethical Principles" ETHICS.md || {
            echo "::error file=ETHICS.md::Ethical compliance block missing"
            exit 1
          }
          echo "ETHICS.md validation passed."

      - name: Security baseline check
        run: |
          set -e
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::Tracked .env file detected"
            exit 1
          fi
          echo "Security baseline passed."

      - name: Final validation
        run: echo "RZ1 VALIDATION PASSED"

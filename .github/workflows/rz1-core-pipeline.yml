name: RZ1 Core Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Basic audit scan
        run: |
          echo "Running audit..."
          if grep -r --exclude-dir=".git" --exclude-dir=".github" --exclude-dir="node_modules" "API_KEY" .; then
            echo "⚠️ Potential secret detected"
          else
            echo "✅ No secrets found"
          fi

      - name: Compliance log
        run: echo "RZ1 Compliance Check Passed"
